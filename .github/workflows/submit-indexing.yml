name: Submit to search engines (IndexNow)

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'sitemap.xml'
      - 'feed.xml'
      - 'robots.txt'
      - 'indexing-config.json'
      - 'scripts/submit-indexing.mjs'
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ping IndexNow + Bing sitemap
        run: node scripts/submit-indexing.mjs
